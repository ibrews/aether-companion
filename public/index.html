<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Aether Companion</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Loading screen -->
  <div id="loading">
    <div class="loading-orb"></div>
    <p>Initializing Aether...</p>
  </div>

  <!-- 3D canvas -->
  <canvas id="scene-canvas"></canvas>

  <!-- Chat overlay -->
  <div id="chat-panel">
    <div id="chat-messages">
      <div class="message system">
        <span class="msg-text">Aether is ready. Say hello.</span>
      </div>
    </div>
    <div id="chat-input-area">
      <button id="mic-btn" title="Hold to speak" aria-label="Voice input">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <input id="chat-input" type="text" placeholder="Talk to Aether..." autocomplete="off" spellcheck="false">
      <button id="send-btn" title="Send" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- XR button -->
  <button id="xr-button" style="display:none">Enter AR</button>

  <!-- Controls bar -->
  <div id="controls-bar">
    <button id="bg-toggle" title="Toggle transparent background">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 2a10 10 0 0 1 0 20"/>
      </svg>
    </button>
  </div>

  <!-- Ollama offline banner -->
  <div id="ollama-offline" style="display:none">
    <div class="offline-icon">!</div>
    <div class="offline-text">
      <strong>Ollama not detected</strong>
      <p>Aether needs a local LLM to chat. Start Ollama on this machine or point to a network host.</p>
      <code>ollama serve</code>
    </div>
    <button id="retry-ollama">Retry</button>
  </div>

  <!-- Status bar -->
  <div id="status-bar">
    <span id="ollama-status" class="status-dot offline"></span>
    <span id="model-name">--</span>
    <span id="version">v1.0.0</span>
  </div>

  <!-- Three.js loaded as classic script, modules as ES modules -->
  <script src="/lib/three.module.js" type="module"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
